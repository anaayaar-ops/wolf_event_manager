name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # حفظ ملفاتك الأصلية مؤقتاً
          mkdir temp_files
          cp lib/main.dart temp_files/
          cp pubspec.yaml temp_files/
          
          # مسح المجلد لتهيئته من جديد بشكل صحيح
          rm -rf *
          
          # إنشاء مشروع فلاتر جديد بنفس الاسم
          flutter create --project-name wolf_event_manager .
          
          # إعادة ملفاتك الأصلية للمشروع الجديد
          cp temp_files/main.dart lib/
          cp temp_files/pubspec.yaml .
          
          # تحميل المكتبات وبناء التطبيق
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
