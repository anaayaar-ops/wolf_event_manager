name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # 1. إنشاء مجلد مؤقت وحفظ ملفاتك بداخله
          mkdir temp_files
          # البحث عن ملف main.dart ونسخه بغض النظر عن مكانه
          find . -name "main.dart" -exec cp {} temp_files/ \;
          cp pubspec.yaml temp_files/ || echo "pubspec not found"
          
          # 2. تنظيف المستودع لتهيئته من جديد
          # حفظ المجلد المؤقت وملف الوورك فلو من الحذف
          mv temp_files ../
          mv .github ../
          rm -rf *
          mv ../temp_files .
          mv ../.github .
          
          # 3. إنشاء مشروع فلاتر جديد
          flutter create --project-name wolf_event_manager --offline .
          
          # 4. إعادة ملفاتك البرمجية للمكان الصحيح
          cp temp_files/main.dart lib/
          cp temp_files/pubspec.yaml .
          
          # 5. تحميل المكتبات وبناء التطبيق
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
