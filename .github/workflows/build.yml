name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK Cleanly
        run: |
          # 1. إنشاء مشروع جديد في مجلد منفصل تماماً لتجنب التعارض
          flutter create --project-name wolf_app new_project
          
          # 2. إضافة مكتبة الروابط للمشروع الجديد
          cd new_project
          flutter pub add url_launcher
          
          # 3. استرجاع كودك من المجلد الرئيسي للمشروع الجديد
          cp ../lib/main.dart lib/main.dart
          
          # 4. بناء التطبيق
          flutter pub get
          flutter build apk --release
          
          # 5. نقل الملف لمكان يسهل على قيت هب إيجاده
          cp build/app/outputs/flutter-apk/app-release.apk ../wolf_final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: wolf_final.apk
