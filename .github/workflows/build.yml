name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean and Reconstruct Project
        run: |
          # 1. إنشاء مجلد خارجي تماماً لحفظ كود الواجهة
          mkdir -p ../backup_dir
          # نسخ الملف فقط إذا كان موجوداً في lib/main.dart لضمان عدم التكرار
          [ -f lib/main.dart ] && cp lib/main.dart ../backup_dir/main.dart || find . -name "main.dart" -exec cp {} ../backup_dir/main.dart \;
          
          # 2. تنظيف شامل للمجلد الحالي
          mv .github ../backup_workflow
          rm -rf *
          mv ../backup_workflow .github
          
          # 3. إنشاء مشروع جديد كلياً وبإصدارات متوافقة تلقائياً
          flutter create --project-name wolf_event_manager --offline .
          
          # 4. إضافة المكتبة المطلوبة بشكل نظيف
          flutter pub add url_launcher
          
          # 5. استرجاع كود الواجهة الخاص بك
          cp ../backup_dir/main.dart lib/main.dart
          
          # 6. تحديث المكتبات وبناء التطبيق
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
