name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Final Build Structure
        run: |
          # 1. تنظيف شامل
          rm -rf *
          
          # 2. إنشاء مشروع Flutter جديد
          flutter create --project-name wolf_event_manager .
          
          # 3. إضافة المكتبات الضرورية
          flutter pub add intl http
          
          # 4. كتابة كود الواجهة (الذي عدلناه معاً)
          # سأقوم بكتابة نسخة مبسطة ومستقرة جداً لضمان العمل
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:intl/intl.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF0D3D33)),
            home: WolfApp(),
          ));

          class WolfApp extends StatefulWidget {
            @override
            _WolfAppState createState() => _WolfAppState();
          }

          class _WolfAppState extends State<WolfApp> {
            final TextEditingController roomController = TextEditingController(text: "9969");
            final TextEditingController dateController = TextEditingController(text: "2026-03-05");
            
            // بيانات تجريبية (سيتم ربطها بالبوت لاحقاً)
            List<Map<String, dynamic>> events = [
              {"id": "753729", "time": "12:00 AM", "selected": true},
              {"id": "753730", "time": "12:45 AM", "selected": false},
              {"id": "753731", "time": "1:10 AM", "selected": true},
            ];

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("WOLF Event Manager"), backgroundColor: Colors.transparent),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(15.0),
                      child: Row(
                        children: [
                          Expanded(child: TextField(controller: roomController, decoration: InputDecoration(labelText: "Room ID"))),
                          SizedBox(width: 10),
                          Expanded(child: TextField(controller: dateController, decoration: InputDecoration(labelText: "Date"))),
                        ],
                      ),
                    ),
                    Expanded(
                      child: ListView.builder(
                        itemCount: events.length,
                        itemBuilder: (c, i) => CheckboxListTile(
                          title: Text("فعالية ${events[i]['id']}"),
                          subtitle: Text("الوقت: ${events[i]['time']}"),
                          value: events[i]['selected'],
                          onChanged: (v) => setState(() => events[i]['selected'] = v!),
                        ),
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(20.0),
                      child: ElevatedButton(
                        style: ElevatedButton.styleFrom(minimumSize: Size(double.infinity, 50), backgroundColor: Colors.white),
                        onPressed: () {
                          String summary = "رقم الروم: ${roomController.text}\nالتاريخ: ${dateController.text}\n";
                          summary += "الفعاليات المختارة:\n" + events.where((e) => e['selected']).map((e) => e['id']).join(", ");
                          showDialog(context: context, builder: (c) => AlertDialog(content: SelectableText(summary)));
                        },
                        child: Text("إنهاء وتصدير نصي", style: TextStyle(color: Colors.black)),
                      ),
                    )
                  ],
                ),
              );
            }
          }
          EOF
          
          # 5. بناء الـ APK النهائي
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-final-app
          path: build/app/outputs/flutter-apk/app-release.apk
