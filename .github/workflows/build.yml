name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct and Build
        run: |
          # حفظ ملفاتك
          mkdir -p temp_files
          cp lib/main.dart temp_files/
          cp pubspec.yaml temp_files/
          
          # تنظيف وبناء مشروع جديد تماماً
          rm -rf *
          flutter create --project-name wolf_event_manager .
          
          # استبدال الملفات
          cp temp_files/main.dart lib/
          cp temp_files/pubspec.yaml .
          
          # البناء مع حقن البيانات السرية
          flutter pub get
          flutter build apk --release \
            --dart-define=EMAIL=${{ secrets.U_MAIL }} \
            --dart-define=PASSWORD=${{ secrets.U_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
