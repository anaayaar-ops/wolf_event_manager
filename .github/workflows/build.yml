name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # 1. حفظ كود البرمجة فقط
          mkdir -p temp_files
          find . -name "main.dart" -exec cp {} temp_files/ \;
          
          # 2. تنظيف شامل للمجلد
          mv .github ../
          rm -rf *
          mv ../.github .
          
          # 3. إنشاء مشروع جديد نظيف تماماً لضمان عدم تعارض المكتبات
          flutter create --project-name wolf_event_manager --offline .
          
          # 4. إضافة المكتبة المطلوبة لفتح الروابط برمجياً
          flutter pub add url_launcher
          
          # 5. استبدال كود الواجهة بكودك الخاص
          cp temp_files/main.dart lib/
          
          # 6. تحديث المكتبات وبناء الـ APK
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
