name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Interactive Build
        run: |
          rm -rf *
          flutter create --project-name wolf_manager .
          flutter pub add intl
          
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:intl/intl.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            theme: ThemeData.dark().copyWith(
              scaffoldBackgroundColor: const Color(0xFF14302C),
              primaryColor: Colors.tealAccent,
            ),
            home: WolfInteractiveApp(),
          ));

          class EventItem {
            String id;
            TimeOfDay time;
            bool isSelected;
            EventItem({required this.id, required this.time, this.isSelected = true});
          }

          class WolfInteractiveApp extends StatefulWidget {
            @override
            _WolfInteractiveAppState createState() => _WolfInteractiveAppState();
          }

          class _WolfInteractiveAppState extends State<WolfInteractiveApp> {
            final TextEditingController roomController = TextEditingController(text: "9969");
            DateTime selectedDate = DateTime.now();
            List<EventItem> events = [
              EventItem(id: "753729", time: TimeOfDay(hour: 0, minute: 0)),
              EventItem(id: "753730", time: TimeOfDay(hour: 0, minute: 45)),
              EventItem(id: "753731", time: TimeOfDay(hour: 1, minute: 10)),
              EventItem(id: "753732", time: TimeOfDay(hour: 2, minute: 15)),
              EventItem(id: "753733", time: TimeOfDay(hour: 3, minute: 00)),
            ];

            Future<void> _pickDate() async {
              DateTime? picked = await showDatePicker(
                context: context,
                initialDate: selectedDate,
                firstDate: DateTime(2025),
                lastDate: DateTime(2030),
              );
              if (picked != null) setState(() => selectedDate = picked);
            }

            Future<void> _pickTime(int index) async {
              TimeOfDay? picked = await showTimePicker(
                context: context,
                initialTime: events[index].time,
              );
              if (picked != null) setState(() => events[index].time = picked);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("WOLF Event Manager"), centerTitle: true, elevation: 0),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(15.0),
                      child: Row(
                        children: [
                          Expanded(child: TextField(controller: roomController, decoration: InputDecoration(labelText: "Room ID", border: OutlineInputBorder()))),
                          SizedBox(width: 10),
                          Expanded(
                            child: InkWell(
                              onTap: _pickDate,
                              child: InputDecorator(
                                decoration: InputDecoration(labelText: "Date", border: OutlineInputBorder()),
                                child: Text(DateFormat('yyyy-MM-dd').format(selectedDate)),
                              ),
                            ),
                          ),
                        ],
                      ),
                    ),
                    Expanded(
                      child: ListView.builder(
                        itemCount: events.length,
                        itemBuilder: (c, i) => CheckboxListTile(
                          activeColor: Colors.tealAccent,
                          title: Row(
                            children: [
                              Text("فعالية ${events[i].id}"),
                              Spacer(),
                              TextButton(
                                style: TextButton.styleFrom(
                                  backgroundColor: Colors.black26,
                                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8)),
                                ),
                                onPressed: () => _pickTime(i),
                                child: Text(
                                  events[i].time.format(context),
                                  style: TextStyle(color: Colors.yellowAccent),
                                ),
                              ),
                            ],
                          ),
                          value: events[i].isSelected,
                          onChanged: (v) => setState(() => events[i].isSelected = v!),
                        ),
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(20.0),
                      child: ElevatedButton(
                        style: ElevatedButton.styleFrom(
                          minimumSize: Size(double.infinity, 55),
                          backgroundColor: Colors.white,
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(30)),
                        ),
                        onPressed: () {
                          String summary = "رقم الروم: ${roomController.text}\nالتاريخ: ${DateFormat('yyyy-MM-dd').format(selectedDate)}\n";
                          summary += "الفعاليات المختارة:\n" + events.where((e) => e.isSelected).map((e) => "${e.id} @ ${e.time.format(context)}").join("\n");
                          showDialog(context: context, builder: (c) => AlertDialog(content: SelectableText(summary)));
                        },
                        child: Text("إنهاء وتصدير نصي", style: TextStyle(color: Colors.black, fontWeight: FontWeight.bold)),
                      ),
                    )
                  ],
                ),
              );
            }
          }
          EOF
          
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-fixed
          path: build/app/outputs/flutter-apk/app-release.apk
                        itemCount: events.length,
                        itemBuilder: (c, i) => CheckboxListTile(
                          activeColor: Colors.tealAccent,
                          title: Row(
                            children: [
                              Text("فعالية ${events[i].id}"),
                              Spacer(),
                              ActionChip(
                                label: Text(events[i].time.format(context), style: TextStyle(color: Colors.yellowAccent)),
                                backgroundColor: Colors.black26,
                                onTap: () => _pickTime(i),
                              ),
                            ],
                          ),
                          value: events[i].isSelected,
                          onChanged: (v) => setState(() => events[i].isSelected = v!),
                        ),
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(20.0),
                      child: ElevatedButton(
                        style: ElevatedButton.styleFrom(
                          minimumSize: Size(double.infinity, 55),
                          backgroundColor: Colors.white,
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(30)),
                        ),
                        onPressed: () {
                          String summary = "رقم الروم: ${roomController.text}\nالتاريخ: ${DateFormat('yyyy-MM-dd').format(selectedDate)}\n";
                          summary += "الفعاليات المختارة:\n" + events.where((e) => e.isSelected).map((e) => "${e.id} @ ${e.time.format(context)}").join("\n");
                          showDialog(context: context, builder: (c) => AlertDialog(content: SelectableText(summary)));
                        },
                        child: Text("إنهاء وتصدير نصي", style: TextStyle(color: Colors.black, fontWeight: FontWeight.bold)),
                      ),
                    )
                  ],
                ),
              );
            }
          }
          EOF
          
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app-final
          path: build/app/outputs/flutter-apk/app-release.apk
