name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build App
        run: |
          rm -rf *
          flutter create --project-name wolf_manager .
          flutter pub add intl
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:intl/intl.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF14302C)),
            home: WolfApp(),
          ));

          class EventItem {
            String id;
            TimeOfDay time;
            bool isSelected;
            EventItem({required this.id, required this.time, this.isSelected = true});
          }

          class WolfApp extends StatefulWidget {
            @override
            _WolfAppState createState() => _WolfAppState();
          }

          class _WolfAppState extends State<WolfApp> {
            final TextEditingController roomController = TextEditingController(text: "9969");
            DateTime selectedDate = DateTime.now();
            List<EventItem> events = [
              EventItem(id: "753729", time: TimeOfDay(hour: 0, minute: 0)),
              EventItem(id: "753730", time: TimeOfDay(hour: 0, minute: 45)),
              EventItem(id: "753731", time: TimeOfDay(hour: 1, minute: 10)),
              EventItem(id: "753732", time: TimeOfDay(hour: 2, minute: 15)),
            ];

            Future<void> _pickDate() async {
              DateTime? p = await showDatePicker(context: context, initialDate: selectedDate, firstDate: DateTime(2025), lastDate: DateTime(2030));
              if (p != null) setState(() => selectedDate = p);
            }

            Future<void> _pickTime(int i) async {
              TimeOfDay? p = await showTimePicker(context: context, initialTime: events[i].time);
              if (p != null) setState(() => events[i].time = p);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("WOLF Event Manager")),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(15.0),
                      child: Row(
                        children: [
                          Expanded(child: TextField(controller: roomController, decoration: InputDecoration(labelText: "Room ID", border: OutlineInputBorder()))),
                          SizedBox(width: 10),
                          Expanded(child: InkWell(onTap: _pickDate, child: InputDecorator(decoration: InputDecoration(labelText: "Date", border: OutlineInputBorder()), child: Text(DateFormat('yyyy-MM-dd').format(selectedDate))))),
                        ],
                      ),
                    ),
                    Expanded(child: ListView.builder(
                      itemCount: events.length,
                      itemBuilder: (c, i) => CheckboxListTile(
                        title: Row(children: [Text("فعالية ${events[i].id}"), Spacer(), TextButton(onPressed: () => _pickTime(i), child: Text(events[i].time.format(context), style: TextStyle(color: Colors.yellowAccent)))]),
                        value: events[i].isSelected,
                        onChanged: (v) => setState(() => events[i].isSelected = v!),
                      ))),
                    Padding(
                      padding: const EdgeInsets.all(20.0),
                      child: ElevatedButton(
                        style: ElevatedButton.styleFrom(minimumSize: Size(double.infinity, 50), backgroundColor: Colors.white),
                        onPressed: () {
                          String s = "الروم: ${roomController.text}\nالتاريخ: ${DateFormat('yyyy-MM-dd').format(selectedDate)}\n";
                          s += events.where((e) => e.isSelected).map((e) => "${e.id} @ ${e.time.format(context)}").join("\n");
                          showDialog(context: context, builder: (c) => AlertDialog(content: SelectableText(s)));
                        },
                        child: Text("إنهاء", style: TextStyle(color: Colors.black))),
                    )
                  ],
                ),
              );
            }
          }
          EOF
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolf-app
          path: build/app/outputs/flutter-apk/app-release.apk
